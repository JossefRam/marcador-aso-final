<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Overlay Marcador</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: Arial;
}

.overlay {
  width: 800px;
  height: 150px;
  margin: auto;
  margin-top: 20px;
  display: flex;
  background: #111;
  border-radius: 10px;
  color: white;
  overflow: hidden;
}

.team {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.score {
  font-size: 60px;
  font-weight: bold;
}

.center {
  width: 200px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #000;
}

.time {
  font-size: 40px;
}

.period {
  color: yellow;
}
</style>
</head>

<body>

<div class="overlay">

  <div class="team">
    <div id="nameLocal">LOCAL</div>
    <div class="score" id="scoreLocal">0</div>
  </div>

  <div class="center">
    <div class="time" id="time">10:00</div>
    <div class="period" id="period">1T</div>
  </div>

  <div class="team">
    <div id="nameVisit">VISITA</div>
    <div class="score" id="scoreVisit">0</div>
  </div>

</div>

<script>
async function actualizar() {
  try {
    const res = await fetch("https://marcador-aso-final.onrender.com/estado?nocache=" + Date.now());
    const data = await res.json();

    document.getElementById("scoreLocal").innerText = data.local;
    document.getElementById("scoreVisit").innerText = data.visita;

    document.getElementById("time").innerText = data.tiempo;
    document.getElementById("period").innerText = data.cuarto;

  } catch (e) {
    console.log("Error:", e);
  }
}

// actualizar cada segundo
setInterval(actualizar, 1000);
actualizar();
</script>

</body>
</html>
